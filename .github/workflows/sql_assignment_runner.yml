name: SQL Unit Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  run-assignment-queries:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r ./.github/scripts/requirements.txt

      - name: Get changed files
        id: changes
        run: |
          git fetch
          git diff --name-only origin/main  > changed_files.txt
      
          echo "Changed files:"
          cat changed_files.txt
      
          if grep -qE '(^|/)assignment2\.sql$' changed_files.txt; then
            echo "assignment_changed=$(grep -qE '(^|/)assignment2\.sql$')" >> "$GITHUB_OUTPUT"
          fi
          if grep -qE '(^|/)assignment1\.sql$' changed_files.txt; then
            echo "assignment_changed=$(grep -qE '(^|/)assignment1\.sql$')" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        id: pytest
        run: |
          pytest tests/test_assignment.py --file_path="${{steps.changes.outputs.assignment_changed}}" --tb=short --disable-warnings \
                 --junitxml=pytest-report.xml || true

      - name: Post test results to PR
        uses: actions/github-script@v7
        with:
          script: |
            function jsonToMarkdownTable(data) {
              if (!Array.isArray(data) || data.length === 0) {
                return 'No data';
              }
              
              const headers = Object.keys(data[0]);
              
              // Header row
              const headerRow = `| ${headers.join(' | ')} |`;
              
              // Separator row
              const separatorRow = `| ${headers.map(() => '---').join(' | ')} |`;
              
              // Data rows
              const rows = data.map(row =>
                `| ${headers.map(h => formatValue(row[h])).join(' | ')} |`
              );
              
              return [headerRow, separatorRow, ...rows].join('\n');
              }
              
            function formatValue(value) {
              if (value === null || value === undefined) return '';
              if (typeof value === 'object') return `\`${JSON.stringify(value)}\``;
              return String(value);
            }
          
            const fs = require('fs')
            const file_read_result = fs.readFileSync('test-results.json', 'utf8')
            const results = JSON.parse(file_read_result)
            let body = `### 🧪 SQL Queries Run Results\n\n`
            body += `<details> <summary>Click to expand/collapse assignment queries execution results</summary>`
            for (const result of results) {
                body += `✅ Query ${result.number}: \n\n *${result.query}*, \n\n **Results**:  \n`
                const table = jsonToMarkdownTable(result.result)
                body +=  `${table} \n`
                body += `\n`
                body += `-------------------------------------------------------- \n` 
            }
            body += `</details>`
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })

